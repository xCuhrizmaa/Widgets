<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.header-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
}

.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.tab { color: #888; cursor: pointer; }
.tab.active { color: #00ff88; }

.list { padding: 10px; }

.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }
.yellow { color: #ffd166; }

.ai {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

.confidence {
  font-size: 12px;
  margin-top: 3px;
}

.star {
  cursor: pointer;
  margin-left: 6px;
}

iframe {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>

<script>

// CONFIG
const ids = "bitcoin,hedera-hashgraph,ripple,chainlink,solana";

let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");
let expanded = null;

// FORMAT PRICE
function formatPrice(p){
  if(p >= 1000) return p.toLocaleString(undefined,{maximumFractionDigits:2});
  if(p >= 1) return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:4});
  return p.toLocaleString(undefined,{minimumFractionDigits:4,maximumFractionDigits:6});
}

// AI INSIGHT
function getInsight(change){
  if(change > 5) return "🚀 Strong upward momentum";
  if(change > 2) return "📈 Uptrend forming";
  if(change < -5) return "🔻 Strong downtrend";
  if(change < -2) return "⚠️ Pullback / weakness";
  return "➖ Consolidating";
}

// CONFIDENCE
function getConfidence(change){
  let score = 50 + (change * 4);
  return Math.max(0, Math.min(100, Math.round(score)));
}

// WATCHLIST
function toggleWatch(symbol,e){
  e.stopPropagation();
  if(watchlist.includes(symbol)){
    watchlist = watchlist.filter(s=>s!==symbol);
  } else {
    watchlist.push(symbol);
  }
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  loadCrypto();
}

// EXPAND
function toggleExpand(symbol){
  expanded = expanded === symbol ? null : symbol;
  loadCrypto();
}

// MARKET DATA
async function loadMarket(){
  try {
    const res = await fetch("https://api.coingecko.com/api/v3/global");
    const d = await res.json();

    document.getElementById("marketCap").textContent =
      "$" + (d.data.total_market_cap.usd / 1e12).toFixed(2) + "T";

    document.getElementById("marketChange").textContent =
      d.data.market_cap_change_percentage_24h_usd.toFixed(2) + "%";

    document.getElementById("btcDom").textContent =
      d.data.market_cap_percentage.btc.toFixed(1) + "%";

  } catch {
    document.getElementById("marketCap").textContent = "Unavailable";
    document.getElementById("marketChange").textContent = "--";
    document.getElementById("btcDom").textContent = "--";
  }
}

// FEAR GREED
async function loadFear(){
  try {
    const r = await fetch("https://api.alternative.me/fng/");
    const d = await r.json();
    document.getElementById("fearValue").textContent = d.data[0].value;
  } catch {
    document.getElementById("fearValue").textContent = "--";
  }
}

// CRYPTO (FIXED)
async function loadCrypto(){
  const el = document.getElementById("crypto");
  el.innerHTML = "Loading...";

  try {
    const res = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`
    );

    const data = await res.json();

    const map = {
      BTC: data.bitcoin,
      HBAR: data["hedera-hashgraph"],
      XRP: data.ripple,
      LINK: data.chainlink,
      SOL: data.solana
    };

    el.innerHTML = "";

    Object.entries(map).forEach(([symbol, d]) => {
      if (!d) return;

      const insight = getInsight(d.usd_24h_change);
      const confidence = getConfidence(d.usd_24h_change);

      let color = confidence > 70 ? "green" :
                  confidence > 40 ? "yellow" : "red";

      el.innerHTML += `
        <div class="card" onclick="toggleExpand('${symbol}')">
          <div class="row">
            <div>
              ${symbol}
              <span class="star" onclick="toggleWatch('${symbol}',event)">
                ${watchlist.includes(symbol) ? "⭐" : "☆"}
              </span>
            </div>
            <div>
              $${formatPrice(d.usd)} <br>
              <span class="${d.usd_24h_change >= 0 ? 'green':'red'}">
                ${d.usd_24h_change.toFixed(2)}%
              </span>
            </div>
          </div>

          <div class="ai">${insight}</div>
          <div class="confidence ${color}">
            Confidence: ${confidence}%
          </div>

          ${expanded===symbol ? `
            <iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?symbol=${symbol}"></iframe>
          ` : ""}
        </div>
      `;
    });

  } catch (err) {
    console.log(err);
    el.innerHTML = "Failed to load prices";
  }
}

// STOCKS
function loadStocks(){
  const el=document.getElementById("stocks");
  el.innerHTML="";
  ["AMD","NVDA","SOFI","SCHD","HOOD"].forEach(s=>{
    el.innerHTML+=`
      <div class="card" onclick="toggleExpand('${s}')">
        <div class="row"><div>${s}</div><div>Tap</div></div>
        ${expanded===s?`<iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?symbol=${s}"></iframe>`:""}
      </div>`;
  });
}

// NAV
function showTab(tab,e){
  document.getElementById("crypto").style.display=tab==="crypto"?"block":"none";
  document.getElementById("stocks").style.display=tab==="stocks"?"block":"none";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  e.target.classList.add("active");
}

// INIT
loadMarket();
loadFear();
loadCrypto();
loadStocks();

setInterval(()=>{
  loadMarket();
  loadFear();
  loadCrypto();
},20000);

</script>

</body>
</html>
