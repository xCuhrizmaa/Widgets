<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

.ticker {
  width: 100%;
  overflow: hidden;
  background: #0b0f14;
  border-bottom: 1px solid #222;
  padding: 8px 0;
}

.ticker-track {
  display: flex;
  width: max-content;
  animation: scrollTicker 20s linear infinite;
  font-size: 13px;
  white-space: nowrap;
}

.ticker-track:hover {
  animation-play-state: paused;
}

@keyframes scrollTicker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  margin-right: 40px;
  flex-shrink: 0;
}

.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.header-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
}

.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.tab { color: #888; cursor: pointer; }
.tab.active { color: #00ff88; }

.list { padding: 10px; }

.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
}

.row {
  display: flex;
  justify-content: space-between;
}

.green { color: #00ff88; }
.red   { color: #ff4d4d; }
.yellow { color: #ffd166; }

.ai {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

.confidence {
  font-size: 12px;
  margin-top: 3px;
}

.chart-container {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  height: 250px;
}
</style>

</head>

<body>

<div class="ticker">
  <div id="tickerTrack" class="ticker-track">
    <span class="ticker-item" style="color:#888">Loading market data...</span>
  </div>
</div>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>

<script>

let expanded    = null;
let cryptoCache = null;
let sp500Cache  = null;
let tickerBuilt = false; // tracks whether ticker has rendered at least once

// ── UTILS ──────────────────────────────────────────────

function formatPrice(p) {
  return p >= 1 ? p.toFixed(2) : p.toFixed(5);
}

function getInsight(change) {
  if (change > 5)  return "🚀 Strong upward momentum";
  if (change > 2)  return "📈 Uptrend forming";
  if (change < -5) return "🔻 Strong downtrend";
  if (change < -2) return "⚠️ Pullback";
  return "➖ Consolidating";
}

function getConfidence(change) {
  return Math.max(0, Math.min(100, Math.round(50 + change * 4)));
}

// ── TICKER ─────────────────────────────────────────────

async function updateTicker() {
  if (!cryptoCache) return;

  // Always try to fetch S&P 500 if we don't have it yet
  if (!sp500Cache) {
    sp500Cache = await loadSP500();
  }

  const cryptoItems = [
    { name: "BTC",  data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP",  data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL",  data: cryptoCache.solana }
  ];

  let html = "";

  // Crypto entries
  cryptoItems.forEach(({ name, data: d }) => {
    if (!d) return;
    const change = d.usd_24h_change;
    const arrow  = change >= 0 ? "▲" : "▼";
    const color  = change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `
      <span class="ticker-item">
        <span style="color:#ccc">${name}</span>
        $${formatPrice(d.usd)}
        <span style="color:${color}">${arrow} ${Math.abs(change).toFixed(2)}%</span>
      </span>
    `;
  });

  // S&P 500 entry — included when available, skipped silently if not
  if (sp500Cache && sp500Cache.price) {
    const arrow = sp500Cache.change >= 0 ? "▲" : "▼";
    const color = sp500Cache.change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `
      <span class="ticker-item">
        <span style="color:#ccc">S&P 500</span>
        $${sp500Cache.price.toFixed(2)}
        <span style="color:${color}">${arrow} ${Math.abs(sp500Cache.change).toFixed(2)}%</span>
      </span>
    `;
  }

  // Always re-render — the key guard was causing the ticker to go blank
  // when sp500 loaded after crypto. Safe to re-render since animation resets
  // are invisible at normal scroll speed.
  document.getElementById("tickerTrack").innerHTML = html + html;
  tickerBuilt = true;
}

// ── S&P 500 ────────────────────────────────────────────

async function loadSP500() {
  try {
    const res = await fetch("/sp500");
    const d   = await res.json();
    // Validate we got real data back
    if (d && typeof d.price === "number") return d;
    return null;
  } catch {
    return null;
  }
}

// ── EXPAND ─────────────────────────────────────────────

function toggleExpand(symbol) {
  expanded = expanded === symbol ? null : symbol;
  if (document.getElementById("crypto").style.display !== "none") {
    renderCrypto();
  } else {
    renderStocks();
  }
}

// ── CRYPTO LIST ────────────────────────────────────────

function renderCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) return;

  const map = {
    BTC:  { data: cryptoCache.bitcoin,            tvSymbol: "BTCUSD"  },
    HBAR: { data: cryptoCache["hedera-hashgraph"], tvSymbol: "HBARUSD" },
    XRP:  { data: cryptoCache.ripple,             tvSymbol: "XRPUSD"  },
    LINK: { data: cryptoCache.chainlink,          tvSymbol: "LINKUSD" },
    SOL:  { data: cryptoCache.solana,             tvSymbol: "SOLUSD"  }
  };

  let html = "";

  Object.entries(map).forEach(([symbol, { data: d, tvSymbol }]) => {
    if (!d) return;

    const insight    = getInsight(d.usd_24h_change);
    const confidence = getConfidence(d.usd_24h_change);
    const confColor  = confidence > 70 ? "green" : confidence > 40 ? "yellow" : "red";
    const chgColor   = d.usd_24h_change >= 0 ? "green" : "red";
    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol, dateRange: "1D",
      colorTheme: "dark", isTransparent: true, autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="text-align:right">
            $${formatPrice(d.usd)}<br>
            <span class="${chgColor}">${d.usd_24h_change.toFixed(2)}%</span>
          </div>
        </div>
        <div class="ai">${insight}</div>
        <div class="confidence ${confColor}">Confidence: ${confidence}%</div>
        ${isExpanded ? `
          <div class="chart-container">
            <iframe
              src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"
              style="width:100%;height:100%;border:none;"
            ></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// ── STOCKS LIST ────────────────────────────────────────

function renderStocks() {
  const el = document.getElementById("stocks");

  const stocks = [
    { symbol: "AMD",  tvSymbol: "NASDAQ:AMD"  },
    { symbol: "NVDA", tvSymbol: "NASDAQ:NVDA" },
    { symbol: "SOFI", tvSymbol: "NASDAQ:SOFI" },
    { symbol: "SCHD", tvSymbol: "AMEX:SCHD"   },
    { symbol: "HOOD", tvSymbol: "NASDAQ:HOOD" }
  ];

  let html = "";

  stocks.forEach(({ symbol, tvSymbol }) => {
    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol, dateRange: "1D",
      colorTheme: "dark", isTransparent: true, autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="color:#888;font-size:12px;">Tap to expand</div>
        </div>
        ${isExpanded ? `
          <div class="chart-container">
            <iframe
              src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"
              style="width:100%;height:100%;border:none;"
            ></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// ── MARKET HEADER ──────────────────────────────────────

async function loadMarket() {
  try {
    const res = await fetch("/market");
    const d   = await res.json();

    document.getElementById("marketCap").textContent =
      "$" + (d.data.total_market_cap.usd / 1e12).toFixed(2) + "T";

    const change   = d.data.market_cap_change_percentage_24h_usd;
    const changeEl = document.getElementById("marketChange");
    changeEl.textContent = change.toFixed(2) + "%";
    changeEl.className   = "value " + (change >= 0 ? "green" : "red");

    document.getElementById("btcDom").textContent =
      d.data.market_cap_percentage.btc.toFixed(1) + "%";

  } catch {
    document.getElementById("marketCap").textContent = "Unavailable";
  }
}

// ── FEAR & GREED ───────────────────────────────────────

async function loadFear() {
  try {
    const r = await fetch("https://api.alternative.me/fng/");
    const d = await r.json();
    document.getElementById("fearValue").textContent =
      d.data[0].value + " – " + d.data[0].value_classification;
  } catch {
    document.getElementById("fearValue").textContent = "--";
  }
}

// ── CRYPTO FETCH ───────────────────────────────────────

async function loadCrypto() {
  const el = document.getElementById("crypto");

  if (!cryptoCache) {
    el.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";
  }

  try {
    const res = await fetch("/crypto");
    cryptoCache = await res.json();
    renderCrypto();
    await updateTicker();
  } catch {
    if (!cryptoCache) {
      el.innerHTML = "<div style='padding:10px;color:#ff4d4d'>Failed to load prices</div>";
    }
  }
}

// ── NAV ────────────────────────────────────────────────

function showTab(tab, e) {
  document.getElementById("crypto").style.display = tab === "crypto" ? "block" : "none";
  document.getElementById("stocks").style.display = tab === "stocks" ? "block" : "none";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  e.target.classList.add("active");
}

// ── INIT ───────────────────────────────────────────────

loadMarket();
loadFear();
loadCrypto();
renderStocks();

setInterval(() => {
  loadCrypto();
  loadMarket();
}, 60000);

</script>

</body>
</html>
