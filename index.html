<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

.ticker {
  width: 100%;
  overflow: hidden;
  background: #0b0f14;
  border-bottom: 1px solid #222;
  padding: 8px 0;
  cursor: default;
}

.ticker-track {
  display: flex;
  will-change: transform;
  font-size: 13px;
  white-space: nowrap;
  width: max-content;
}

.ticker-item {
  margin-right: 50px;
  flex-shrink: 0;
  display: inline-block;
}

.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.header-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
}

.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.tab { color: #888; cursor: pointer; }
.tab.active { color: #00ff88; }

.list { padding: 10px; }

.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
}

.row {
  display: flex;
  justify-content: space-between;
}

.green  { color: #00ff88; }
.red    { color: #ff4d4d; }
.yellow { color: #ffd166; }

.ai {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

.confidence {
  font-size: 12px;
  margin-top: 3px;
}

.chart-container {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  height: 250px;
}

.news-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.news-title {
  font-size: 14px;
  margin-bottom: 6px;
}

.news-source {
  font-size: 11px;
  color: #888;
}

/* ── VERSE STYLES ───────────────────────────── */

.verse-card {
  background: #161b22;
  margin: 10px 15px;
  padding: 14px;
  border-radius: 12px;
  opacity: 1;
  transform: translateY(0);
  transition: all 0.4s ease;
  box-shadow: 0 0 0px rgba(0,255,136,0.0);
}

.verse-card.fade-out {
  opacity: 0;
  transform: translateY(10px);
}

.verse-card.fade-in {
  opacity: 1;
  transform: translateY(0);
}

.verse-card:hover {
  box-shadow: 0 0 12px rgba(0,255,136,0.15);
}

.verse-text {
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 6px;
}

.verse-ref {
  font-size: 12px;
  color: #888;
}

/* ── MOVER STYLES ───────────────────────────── */

.mover-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.mover-title {
  font-size: 13px;
  color: #888;
  margin-bottom: 6px;
}

.mover-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

/* ── INPUT STYLES ───────────────────────────── */

.dash-input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  margin-bottom: 10px;
  outline: none;
}

.dash-input:focus {
  border-color: #00ff88;
}

.dash-select {
  width: 100%;
  background: #0d1117;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  margin-bottom: 10px;
  outline: none;
}

.dash-select:focus {
  border-color: #00ff88;
}

.calc-result {
  background: #0d1117;
  border-radius: 8px;
  padding: 12px;
  margin-top: 4px;
  font-size: 14px;
  line-height: 1.8;
}

/* ── TOOLS INPUT STYLES ─────────────────────── */

.tool-input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  margin-bottom: 8px;
  outline: none;
}

.tool-input:focus {
  border-color: #00ff88;
}

.tool-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00ff88;
  color: #0d1117;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.tool-btn:active {
  opacity: 0.8;
}
</style>

</head>
<body>

<div class="ticker" id="tickerOuter">
  <div id="tickerTrack" class="ticker-track">
    <span class="ticker-item" style="color:#888">Loading market data...</span>
  </div>
</div>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div id="dailyVerse"></div>

<div id="topMovers" style="padding:15px"></div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🧠 AI Market Insight</div>
  <div id="aiInsight" class="news-card" style="cursor:default;">Loading insight...</div>
</div>

<!-- ── CRYPTO CALCULATOR ─────────────────────── -->

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🧮 Crypto Calculator</div>
  <div class="news-card" style="cursor:default;">
    <select id="calcCoin" class="dash-select">
      <option value="bitcoin">BTC</option>
      <option value="hedera-hashgraph">HBAR</option>
      <option value="ripple">XRP</option>
      <option value="chainlink">LINK</option>
      <option value="solana">SOL</option>
    </select>
    <input id="calcAmount" class="dash-input" placeholder="Holdings (e.g. 500)" type="number" />
    <input id="calcTarget" class="dash-input" placeholder="Target Price (e.g. 3.45)" type="number" />
    <div id="calcResult" class="calc-result" style="display:none;"></div>
  </div>
</div>

<!-- ── PORTFOLIO ─────────────────────────────── -->

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">💼 My Portfolio</div>
  <div class="news-card" style="cursor:default;">
    <select id="portfolioCoin" class="dash-select">
      <option value="bitcoin">BTC</option>
      <option value="hedera-hashgraph">HBAR</option>
      <option value="ripple">XRP</option>
      <option value="chainlink">LINK</option>
      <option value="solana">SOL</option>
    </select>
    <input id="portfolioAmount" class="dash-input" placeholder="Amount (e.g. 500)" type="number" />
    <button onclick="addHolding()" style="width:100%;background:#00ff88;color:#0d1117;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:bold;cursor:pointer;">Add Holding</button>
  </div>
  <div id="portfolioList" style="margin-top:10px;"></div>
</div>

<!-- ── TABS ──────────────────────────────────── -->

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
  <div class="tab" onclick="showTab('tools', event)">Tools</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>
<div id="tools" class="list" style="display:none;"></div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🪙 Crypto News</div>
  <div id="cryptoNews"></div>
</div>

<!-- ── CRYPTO SEARCH ─────────────────────────── -->

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🔍 Search Any Crypto</div>
  <input id="cryptoSearch" class="dash-input" placeholder="e.g. dogecoin, cardano..." />
  <div id="cryptoSearchResult"></div>
</div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">📈 Stock News</div>
  <div id="stockNews"></div>
</div>

<!-- ── STOCK SEARCH ──────────────────────────── -->

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">📊 Search Any Stock</div>
  <input id="stockSearch" class="dash-input" placeholder="e.g. AAPL, TSLA, MSFT..." />
  <div id="stockSearchResult"></div>
</div>

<script>

// ── GLOBALS ────────────────────────────────────────────
let expanded      = null;
let cryptoCache   = null;
let sp500Cache    = null;
let lastTickerKey = "";

// ── TICKER ENGINE ──────────────────────────────────────

let tickerX      = 0;
let tickerHalfW  = 0;
let tickerPaused = false;
let tickerRAF    = null;
const TICKER_SPEED = 0.5;

function tickerStep() {
  if (!tickerPaused) {
    tickerX -= TICKER_SPEED;
    if (tickerHalfW > 0 && tickerX <= -tickerHalfW) tickerX = 0;
    document.getElementById("tickerTrack").style.transform = `translateX(${tickerX}px)`;
  }
  tickerRAF = requestAnimationFrame(tickerStep);
}

document.getElementById("tickerOuter").addEventListener("touchstart", () => { tickerPaused = true; });
document.getElementById("tickerOuter").addEventListener("touchend",   () => { tickerPaused = false; });
document.getElementById("tickerOuter").addEventListener("mouseenter", () => { tickerPaused = true; });
document.getElementById("tickerOuter").addEventListener("mouseleave", () => { tickerPaused = false; });

function startTicker() {
  if (tickerRAF) cancelAnimationFrame(tickerRAF);
  tickerX = 0;
  tickerRAF = requestAnimationFrame(tickerStep);
}

// ── UTILS ──────────────────────────────────────────────

function formatPrice(p) {
  return p >= 1 ? p.toFixed(2) : p.toFixed(5);
}

function getInsight(change) {
  if (change > 5)  return "🚀 Strong upward momentum";
  if (change > 2)  return "📈 Uptrend forming";
  if (change < -5) return "🔻 Strong downtrend";
  if (change < -2) return "⚠️ Pullback";
  return "➖ Consolidating";
}

function getConfidence(change) {
  return Math.max(0, Math.min(100, Math.round(50 + change * 4)));
}

// ── S&P 500 ────────────────────────────────────────────

async function loadSP500() {
  try {
    const res  = await fetch("/sp500");
    const data = await res.json();
    if (data && typeof data.price === "number" && typeof data.change === "number") {
      return data;
    }
    return null;
  } catch (err) {
    console.error("SP500 fetch error:", err);
    return null;
  }
}

// ── TICKER BUILD ───────────────────────────────────────

async function updateTicker() {
  if (!cryptoCache) return;

  const freshSP = await loadSP500();
  if (freshSP) sp500Cache = freshSP;

  const cryptoItems = [
    { name: "BTC",  data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP",  data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL",  data: cryptoCache.solana }
  ];

  const newKey = cryptoItems.map(i =>
    i.data ? `${i.name}:${i.data.usd}:${i.data.usd_24h_change}` : ""
  ).join("|") +
  (sp500Cache ? `|SP:${sp500Cache.price}:${sp500Cache.change}` : "");

  if (newKey === lastTickerKey) return;
  lastTickerKey = newKey;

  let html = "";

  cryptoItems.forEach(({ name, data: d }) => {
    if (!d) return;
    const change = d.usd_24h_change;
    const arrow  = change >= 0 ? "▲" : "▼";
    const color  = change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `
      <span class="ticker-item">
        <span style="color:#ccc">${name}</span>
        $${formatPrice(d.usd)}
        <span style="color:${color}">${arrow} ${Math.abs(change).toFixed(2)}%</span>
      </span>
    `;
  });

  if (sp500Cache) {
    const arrow = sp500Cache.change >= 0 ? "▲" : "▼";
    const color = sp500Cache.change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `
      <span class="ticker-item">
        <span style="color:#ccc">S&P 500</span>
        $${sp500Cache.price.toFixed(2)}
        <span style="color:${color}">${arrow} ${Math.abs(sp500Cache.change).toFixed(2)}%</span>
      </span>
    `;
  }

  const track = document.getElementById("tickerTrack");
  track.innerHTML = html + html;

  setTimeout(() => {
    tickerHalfW = track.scrollWidth / 2;
    tickerX = 0;
  }, 100);
}

// ── EXPAND ─────────────────────────────────────────────

function toggleExpand(symbol) {
  expanded = expanded === symbol ? null : symbol;
  if (document.getElementById("crypto").style.display !== "none") {
    renderCrypto();
  } else {
    renderStocks();
  }
}

// ── CRYPTO LIST ────────────────────────────────────────

function renderCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) return;

  const map = {
    BTC:  { data: cryptoCache.bitcoin,            tvSymbol: "BTCUSD"  },
    HBAR: { data: cryptoCache["hedera-hashgraph"], tvSymbol: "HBARUSD" },
    XRP:  { data: cryptoCache.ripple,             tvSymbol: "XRPUSD"  },
    LINK: { data: cryptoCache.chainlink,          tvSymbol: "LINKUSD" },
    SOL:  { data: cryptoCache.solana,             tvSymbol: "SOLUSD"  }
  };

  let html = "";

  Object.entries(map).forEach(([symbol, { data: d, tvSymbol }]) => {
    if (!d) return;

    const insight    = getInsight(d.usd_24h_change);
    const confidence = getConfidence(d.usd_24h_change);
    const confColor  = confidence > 70 ? "green" : confidence > 40 ? "yellow" : "red";
    const chgColor   = d.usd_24h_change >= 0 ? "green" : "red";
    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol, dateRange: "1D",
      colorTheme: "dark", isTransparent: true, autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="text-align:right">
            $${formatPrice(d.usd)}<br>
            <span class="${chgColor}">${d.usd_24h_change.toFixed(2)}%</span>
          </div>
        </div>
        <div class="ai">${insight}</div>
        <div class="confidence ${confColor}">Confidence: ${confidence}%</div>
        ${isExpanded ? `
          <div class="chart-container">
            <iframe
              src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"
              style="width:100%;height:100%;border:none;"
            ></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// ── TOP MOVERS ─────────────────────────────────────────

function renderTopMovers() {
  if (!cryptoCache) return;

  const coins = [
    { name: "BTC",  data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP",  data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL",  data: cryptoCache.solana }
  ].filter(c => c.data);

  const sorted  = coins.sort((a, b) => b.data.usd_24h_change - a.data.usd_24h_change);
  const gainers = sorted.slice(0, 2);
  const losers  = sorted.slice(-2).reverse();

  const el = document.getElementById("topMovers");

  el.innerHTML = `
    <div style="font-weight:bold;margin-bottom:10px;">📊 Top Movers</div>
    <div class="mover-card">
      <div class="mover-title">🚀 Top Gainers</div>
      ${gainers.map(c => `
        <div class="mover-row">
          <span>${c.name}</span>
          <span class="green">+${c.data.usd_24h_change.toFixed(2)}%</span>
        </div>
      `).join("")}
    </div>
    <div class="mover-card">
      <div class="mover-title">🔻 Top Losers</div>
      ${losers.map(c => `
        <div class="mover-row">
          <span>${c.name}</span>
          <span class="red">${c.data.usd_24h_change.toFixed(2)}%</span>
        </div>
      `).join("")}
    </div>
  `;
}

// ── STOCKS LIST ────────────────────────────────────────

function renderStocks() {
  const el = document.getElementById("stocks");

  const stocks = [
    { symbol: "AMD",  tvSymbol: "NASDAQ:AMD"  },
    { symbol: "NVDA", tvSymbol: "NASDAQ:NVDA" },
    { symbol: "SOFI", tvSymbol: "NASDAQ:SOFI" },
    { symbol: "SCHD", tvSymbol: "AMEX:SCHD"   },
    { symbol: "HOOD", tvSymbol: "NASDAQ:HOOD" }
  ];

  let html = "";

  stocks.forEach(({ symbol, tvSymbol }) => {
    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol, dateRange: "1D",
      colorTheme: "dark", isTransparent: true, autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="color:#888;font-size:12px;">Tap to expand</div>
        </div>
        ${isExpanded ? `
          <div class="chart-container">
            <iframe
              src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"
              style="width:100%;height:100%;border:none;"
            ></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// ── TOOLS TAB ──────────────────────────────────────────

function renderTools() {
  const el = document.getElementById("tools");

  el.innerHTML = `
    <div class="card" style="cursor:default;">
      <div style="font-weight:bold;margin-bottom:10px;">🧮 Quick Calculator</div>
      <select id="toolCalcCoin" class="dash-select">
        <option value="BTC">BTC</option>
        <option value="HBAR">HBAR</option>
        <option value="XRP">XRP</option>
        <option value="LINK">LINK</option>
        <option value="SOL">SOL</option>
      </select>
      <input id="toolCalcAmount" class="tool-input" placeholder="Amount (e.g. 500)" type="number" />
      <input id="toolCalcTarget" class="tool-input" placeholder="Target Price (e.g. 3.45)" type="number" />
      <button class="tool-btn" onclick="runCalc()">Calculate</button>
      <div id="toolCalcResult" style="margin-top:10px;font-size:14px;line-height:1.8;"></div>
    </div>

    <div class="card" style="cursor:default;">
      <div style="font-weight:bold;margin-bottom:10px;">💼 Portfolio</div>
      <select id="portCoin" class="dash-select">
        <option value="bitcoin">BTC</option>
        <option value="hedera-hashgraph">HBAR</option>
        <option value="ripple">XRP</option>
        <option value="chainlink">LINK</option>
        <option value="solana">SOL</option>
      </select>
      <input id="portAmount" class="tool-input" placeholder="Amount" type="number" />
      <button class="tool-btn" onclick="addHoldingFromTools()">Add Holding</button>
      <div id="toolsPortfolioList" style="margin-top:10px;"></div>
    </div>

    <div class="card" style="cursor:default;">
      <div style="font-weight:bold;margin-bottom:10px;">📊 Paper Trading</div>
      <div style="color:#888;font-size:13px;margin-bottom:10px;">
        Balance: <span style="color:#00ff88;font-weight:bold;">$<span id="paperBalance">${paperBalance.toFixed(2)}</span></span>
      </div>
      <select id="paperCoin" class="dash-select">
        <option value="BTC">BTC</option>
        <option value="HBAR">HBAR</option>
        <option value="XRP">XRP</option>
        <option value="LINK">LINK</option>
        <option value="SOL">SOL</option>
      </select>
      <input id="paperAmount" class="tool-input" placeholder="Amount of coins" type="number" />
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <button class="tool-btn" style="background:#00ff88;color:#0d1117;" onclick="paperBuy()">Buy</button>
        <button class="tool-btn" style="background:#ff4d4d;color:white;" onclick="paperSell()">Sell</button>
      </div>
      <div id="paperPortfolio" style="margin-top:10px;"></div>
    </div>
  `;

  renderToolsPortfolio();
  renderPaperPortfolio();
}

// ── TOOLS CALCULATOR ───────────────────────────────────

function runCalc() {
  const coinLabel = document.getElementById("toolCalcCoin").value;
  const amount    = parseFloat(document.getElementById("toolCalcAmount").value);
  const target    = parseFloat(document.getElementById("toolCalcTarget").value);
  const resultEl  = document.getElementById("toolCalcResult");

  if (!cryptoCache || !amount || !target) {
    resultEl.innerHTML = "<span style='color:#888'>Enter amount and target price.</span>";
    return;
  }

  const coinMap = {
    BTC: cryptoCache.bitcoin,
    HBAR: cryptoCache["hedera-hashgraph"],
    XRP: cryptoCache.ripple,
    LINK: cryptoCache.chainlink,
    SOL: cryptoCache.solana
  };

  const price = coinMap[coinLabel]?.usd;
  if (!price) return;

  const currentVal = amount * price;
  const futureVal  = amount * target;
  const gain       = futureVal - currentVal;
  const gainPct    = ((futureVal - currentVal) / currentVal * 100).toFixed(2);
  const isUp       = futureVal >= currentVal;
  const gainColor  = isUp ? "#00ff88" : "#ff4d4d";

  resultEl.innerHTML = `
    <div style="color:#888;font-size:12px;margin-bottom:6px;">${coinLabel} @ $${formatPrice(price)} now</div>
    <div>Now: <span style="color:white;font-weight:bold;">$${currentVal.toFixed(2)}</span></div>
    <div>At target: <span style="color:${gainColor};font-weight:bold;">$${futureVal.toFixed(2)}</span></div>
    <div style="color:${gainColor};margin-top:4px;">${isUp ? "+" : ""}$${gain.toFixed(2)} (${isUp ? "+" : ""}${gainPct}%) ${isUp ? "🚀" : "📉"}</div>
  `;
}

// ── TOOLS PORTFOLIO (mirrors main portfolio) ────────────

function addHoldingFromTools() {
  const coin   = document.getElementById("portCoin").value;
  const amount = parseFloat(document.getElementById("portAmount").value);

  if (!amount || amount <= 0) return;

  const existing = portfolio.find(p => p.coin === coin);
  if (existing) {
    existing.amount += amount;
  } else {
    portfolio.push({ coin, amount });
  }

  document.getElementById("portAmount").value = "";
  savePortfolio();
  renderPortfolio();
  renderToolsPortfolio();
}

function renderToolsPortfolio() {
  const el = document.getElementById("toolsPortfolioList");
  if (!el) return;

// ── PAPER TRADING ──────────────────────────────────────

let paperBalance  = parseFloat(localStorage.getItem("paperBalance") || "10000");
let paperHoldings = JSON.parse(localStorage.getItem("paperHoldings") || "[]");

function savePaper() {
  localStorage.setItem("paperBalance", paperBalance.toString());
  localStorage.setItem("paperHoldings", JSON.stringify(paperHoldings));
}

function getCoinPrice(label) {
  const coinMap = {
    BTC: cryptoCache?.bitcoin,
    HBAR: cryptoCache?.["hedera-hashgraph"],
    XRP: cryptoCache?.ripple,
    LINK: cryptoCache?.chainlink,
    SOL: cryptoCache?.solana
  };
  return coinMap[label]?.usd || 0;
}

function paperBuy() {
  const coin   = document.getElementById("paperCoin").value;
  const amount = parseFloat(document.getElementById("paperAmount").value);
  if (!amount || amount <= 0 || !cryptoCache) return;

  const price = getCoinPrice(coin);
  if (!price) return;

  const cost = price * amount;
  if (cost > paperBalance) {
    alert("Not enough balance!");
    return;
  }

  paperBalance -= cost;

  const existing = paperHoldings.find(h => h.coin === coin);
  if (existing) {
    existing.amount += amount;
    existing.avgPrice = ((existing.avgPrice * (existing.amount - amount)) + (price * amount)) / existing.amount;
  } else {
    paperHoldings.push({ coin, amount, avgPrice: price });
  }

  savePaper();
  renderPaperPortfolio();
}

function paperSell() {
  const coin   = document.getElementById("paperCoin").value;
  const amount = parseFloat(document.getElementById("paperAmount").value);
  if (!amount || amount <= 0 || !cryptoCache) return;

  const price    = getCoinPrice(coin);
  const existing = paperHoldings.find(h => h.coin === coin);

  if (!existing || existing.amount < amount) {
    alert("Not enough coins to sell!");
    return;
  }

  paperBalance += price * amount;
  existing.amount -= amount;

  if (existing.amount <= 0) {
    paperHoldings = paperHoldings.filter(h => h.coin !== coin);
  }

  savePaper();
  renderPaperPortfolio();
}

function renderPaperPortfolio() {
  const balEl = document.getElementById("paperBalance");
  if (balEl) balEl.textContent = paperBalance.toFixed(2);

  const el = document.getElementById("paperPortfolio");
  if (!el) return;

  if (paperHoldings.length === 0) {
    el.innerHTML = "<div style='color:#888;font-size:13px;'>No paper trades yet.</div>";
    return;
  }

  let portfolioValue = 0;

  el.innerHTML = paperHoldings.map(h => {
    const price    = getCoinPrice(h.coin);
    const value    = h.amount * price;
    const pnl      = value - (h.avgPrice * h.amount);
    const pnlColor = pnl >= 0 ? "#00ff88" : "#ff4d4d";
    portfolioValue += value;

    return `
      <div style="padding:8px 0;border-bottom:1px solid #222;">
        <div style="display:flex;justify-content:space-between;">
          <span style="font-weight:bold;">${h.coin}</span>
          <span style="color:#00ff88;">$${value.toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:3px;">
          <span style="color:#888;font-size:12px;">${h.amount.toFixed(4)} @ $${formatPrice(h.avgPrice)}</span>
          <span style="color:${pnlColor};font-size:12px;">${pnl >= 0 ? "+" : ""}$${pnl.toFixed(2)}</span>
        </div>
      </div>
    `;
  }).join("") + `
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:bold;">
      <span style="color:#888;">Portfolio Value</span>
      <span style="color:#00ff88;">$${portfolioValue.toFixed(2)}</span>
    </div>
  `;
}

// ── CRYPTO CALCULATOR (main section) ───────────────────

function setupCalculator() {
  const coinEl   = document.getElementById("calcCoin");
  const amountEl = document.getElementById("calcAmount");
  const targetEl = document.getElementById("calcTarget");
  const resultEl = document.getElementById("calcResult");

  function update() {
    if (!cryptoCache) return;

    const coin   = coinEl.value;
    const amount = parseFloat(amountEl.value);
    const target = parseFloat(targetEl.value);

    if (!amount || !target) {
      resultEl.style.display = "none";
      resultEl.innerHTML = "";
      return;
    }

    const price = cryptoCache[coin]?.usd;
    if (!price) return;

    const currentVal = amount * price;
    const futureVal  = amount * target;
    const gain       = futureVal - currentVal;
    const gainPct    = ((futureVal - currentVal) / currentVal * 100).toFixed(2);
    const isUp       = futureVal >= currentVal;
    const arrow      = isUp ? "📈🚀" : "📉";
    const gainColor  = isUp ? "#00ff88" : "#ff4d4d";

    const labels = {
      "bitcoin": "BTC", "hedera-hashgraph": "HBAR",
      "ripple": "XRP", "chainlink": "LINK", "solana": "SOL"
    };

    resultEl.style.display = "block";
    resultEl.innerHTML = `
      <div style="color:#888;font-size:12px;margin-bottom:8px;">
        ${labels[coin]} @ $${formatPrice(price)} now
      </div>
      <div style="margin-bottom:4px;">
        Holdings: <span style="color:white">${amount} ${labels[coin]}</span>
        <span style="color:#888"> ($${currentVal.toFixed(2)})</span>
      </div>
      <div style="margin-bottom:4px;">
        Target: <span style="color:white">$${formatPrice(target)}</span>
      </div>
      <div style="margin-top:8px;font-size:15px;font-weight:bold;color:${gainColor};">
        ${amount} ${labels[coin]} ~ $${futureVal.toFixed(2)} ${arrow}
      </div>
      <div style="color:${gainColor};font-size:12px;margin-top:2px;">
        ${isUp ? "+" : ""}$${gain.toFixed(2)} (${isUp ? "+" : ""}${gainPct}%)
      </div>
    `;
  }

  coinEl.onchange   = update;
  amountEl.oninput  = update;
  targetEl.oninput  = update;
}

let portfolio = JSON.parse(localStorage.getItem("portfolio") || "[]");

}

function addHolding() {
  const coin   = document.getElementById("portfolioCoin").value;
  const amount = parseFloat(document.getElementById("portfolioAmount").value);

  if (!amount || amount <= 0) return;

  const existing = portfolio.find(p => p.coin === coin);
  if (existing) {
    existing.amount += amount;
  } else {
    portfolio.push({ coin, amount });
  }

  document.getElementById("portfolioAmount").value = "";
  savePortfolio();
  renderPortfolio();
}

function removeHolding(coin) {
  portfolio = portfolio.filter(p => p.coin !== coin);
  savePortfolio();
  renderPortfolio();
}

      <div class="card" style="cursor:default;">

// ── CRYPTO SEARCH ──────────────────────────────────────

let cryptoSearchTimer = null;

async function searchCrypto() {
  const query  = document.getElementById("cryptoSearch").value.trim().toLowerCase();
  const el     = document.getElementById("cryptoSearchResult");

  if (!query) { el.innerHTML = ""; return; }

  el.innerHTML = "<div style='color:#888;font-size:13px;padding:8px 0'>Searching...</div>";

  try {
    const r = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${query}&vs_currencies=usd&include_24hr_change=true`
    );
    const d = await r.json();
    const coin = d[query];

    if (coin?.usd) {
      const change   = coin.usd_24h_change || 0;
      const arrow    = change >= 0 ? "▲" : "▼";
      const chgColor = change >= 0 ? "#00ff88" : "#ff4d4d";

      el.innerHTML = `
        <div class="mover-card" style="cursor:default;">
          <div class="mover-row">
            <span style="font-weight:bold;text-transform:uppercase;">${query}</span>
            <span style="font-weight:bold;">$${formatPrice(coin.usd)}</span>
          </div>
          <div class="mover-row">
            <span style="color:#888;font-size:12px;">24h Change</span>
            <span style="color:${chgColor};font-size:12px;">${arrow} ${Math.abs(change).toFixed(2)}%</span>
          </div>
        </div>
      `;
    } else {
      el.innerHTML = "<div style='color:#888;font-size:13px;padding:8px 0'>Not found — try the full CoinGecko ID (e.g. \"dogecoin\", \"cardano\")</div>";
    }
  } catch {
    el.innerHTML = "<div style='color:#ff4d4d;font-size:13px;padding:8px 0'>Error fetching data</div>";
  }
}

document.getElementById("cryptoSearch").addEventListener("input", () => {
  clearTimeout(cryptoSearchTimer);
  cryptoSearchTimer = setTimeout(searchCrypto, 600);
});

// ── DAILY VERSE ────────────────────────────────────────

let verseIndex = 0;

const verses = [
  { text: "Commit your actions to the Lord, and your plans will succeed.", ref: "Proverbs 16:3 (NLT)" },
  { text: "Work willingly at whatever you do, as though you were working for the Lord.", ref: "Colossians 3:23 (NLT)" },
  { text: "The plans of the diligent lead surely to profit.", ref: "Proverbs 21:5 (NLT)" },
  { text: "A faithful person will be richly blessed.", ref: "Proverbs 28:20 (NLT)" },
  { text: "Whoever can be trusted with very little can also be trusted with much.", ref: "Luke 16:10 (NLT)" },
  { text: "Lazy people want much but get little, but those who work hard will prosper.", ref: "Proverbs 13:4 (NLT)" },
  { text: "Honor the Lord with your wealth.", ref: "Proverbs 3:9 (NLT)" },
  { text: "Good planning and hard work lead to prosperity.", ref: "Proverbs 21:5 (NLT)" },
  { text: "The blessing of the Lord makes a person rich.", ref: "Proverbs 10:22 (NLT)" }
];

function renderVerse() {
  const v = verses[verseIndex];
  const container = document.getElementById("dailyVerse");

  const existing = container.querySelector(".verse-card");
  if (existing) existing.classList.add("fade-out");

  setTimeout(() => {
    container.innerHTML = `
      <div class="verse-card fade-in" id="verseCard">
        <div style="font-size:11px;color:#00ff88;margin-bottom:6px;">DAILY FOUNDATION</div>
        <div class="verse-text">"${v.text}"</div>
        <div class="verse-ref">— ${v.ref}</div>
      </div>
    `;
  }, 200);
}

function nextVerse() {
  verseIndex = (verseIndex + 1) % verses.length;
  renderVerse();
}

function prevVerse() {
  verseIndex = (verseIndex - 1 + verses.length) % verses.length;
  renderVerse();
}

function loadVerse() {
  verseIndex = new Date().getDate() % verses.length;
  renderVerse();
  setInterval(nextVerse, 900000);
}

// ── VERSE SWIPE ────────────────────────────────────────

let touchStartX = 0;
let touchEndX   = 0;

document.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener("touchend",   (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); });

function handleSwipe() {
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) < 40) return;
  if (diff > 0) { nextVerse(); } else { prevVerse(); }
}

document.addEventListener("click", (e) => {
  if (e.target.closest("#dailyVerse")) nextVerse();
});
