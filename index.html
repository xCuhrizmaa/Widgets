<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

/* 🔥 PERFECT TICKER */
.ticker {
  width: 100%;
  overflow: hidden;
  background: #0b0f14;
  border-bottom: 1px solid #222;
  padding: 8px 0;
}

.ticker-content {
  display: inline-block;
  white-space: nowrap;
  animation: scrollTicker 18s linear infinite;
  font-size: 13px;
}

@keyframes scrollTicker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.header-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
}

.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.tab { color: #888; cursor: pointer; }
.tab.active { color: #00ff88; }

.list { padding: 10px; }

.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
}

.row {
  display: flex;
  justify-content: space-between;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }
.yellow { color: #ffd166; }

.ai {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

.confidence {
  font-size: 12px;
  margin-top: 3px;
}

.chart-container {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  height: 250px;
}
</style>

</head>
<body>

<div class="ticker">
  <div id="tickerContent" class="ticker-content">Loading...</div>
</div>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>

<script>

let expanded = null;
let cryptoCache = null;
let tickerCache = "";
let hasLoadedOnce = false;

// FORMAT
function formatPrice(p) {
  if (p >= 1) return p.toFixed(2);
  return p.toFixed(5);
}

// AI
function getInsight(change) {
  if (change > 5) return "🚀 Strong upward momentum";
  if (change > 2) return "📈 Uptrend forming";
  if (change < -5) return "🔻 Strong downtrend";
  if (change < -2) return "⚠️ Pullback";
  return "➖ Consolidating";
}

function getConfidence(change) {
  let score = 50 + (change * 4);
  return Math.max(0, Math.min(100, Math.round(score)));
}

// 🔥 FIXED TICKER (SEAMLESS + NO RESET)
function updateTicker() {
  if (!cryptoCache) return;

  const items = [
    { name: "BTC", data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP", data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL", data: cryptoCache.solana }
  ];

  let html = "";

  items.forEach(({ name, data: d }) => {
    if (!d) return;

    const change = d.usd_24h_change;
    const arrow = change >= 0 ? "▲" : "▼";
    const color = change >= 0 ? "#00ff88" : "#ff4d4d";

    html += `
      <span style="margin-right:40px">
        ${name} $${formatPrice(d.usd)}
        <span style="color:${color}">
          ${arrow} ${Math.abs(change).toFixed(2)}%
        </span>
      </span>
    `;
  });

  const full = html + html;

  if (full !== tickerCache) {
    tickerCache = full;
    document.getElementById("tickerContent").innerHTML = full;
  }
}

// EXPAND
function toggleExpand(symbol) {
  expanded = expanded === symbol ? null : symbol;

  if (document.getElementById("crypto").style.display !== "none") {
    renderCrypto();
  } else {
    renderStocks();
  }
}

// RENDER CRYPTO
function renderCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) return;

  const map = {
    BTC:  { data: cryptoCache.bitcoin, tvSymbol: "BTCUSD" },
    HBAR: { data: cryptoCache["hedera-hashgraph"], tvSymbol: "HBARUSD" },
    XRP:  { data: cryptoCache.ripple, tvSymbol: "XRPUSD" },
    LINK: { data: cryptoCache.chainlink, tvSymbol: "LINKUSD" },
    SOL:  { data: cryptoCache.solana, tvSymbol: "SOLUSD" }
  };

  let html = "";

  Object.entries(map).forEach(([symbol, { data: d, tvSymbol }]) => {
    if (!d) return;

    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol,
      dateRange: "1D",
      colorTheme: "dark",
      isTransparent: true,
      autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div>$${formatPrice(d.usd)}</div>
        </div>

        ${isExpanded ? `
          <div class="chart-container">
            <iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// STOCKS
function renderStocks() {
  const el = document.getElementById("stocks");

  const stocks = ["AMD","NVDA","SOFI","SCHD","HOOD"];

  el.innerHTML = stocks.map(s => `<div class="card">${s}</div>`).join("");
}

// MARKET + FEAR unchanged
async function loadMarket() {
  try {
    const res = await fetch("/market");
    const d = await res.json();
    document.getElementById("marketCap").textContent =
      "$" + (d.data.total_market_cap.usd / 1e12).toFixed(2) + "T";
  } catch {}
}

async function loadFear() {
  try {
    const r = await fetch("https://api.alternative.me/fng/");
    const d = await r.json();
    document.getElementById("fearValue").textContent = d.data[0].value;
  } catch {}
}

// CRYPTO (NO FLASH)
async function loadCrypto() {
  const el = document.getElementById("crypto");

  if (!hasLoadedOnce) {
    el.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";
  }

  try {
    const res = await fetch("/crypto");
    cryptoCache = await res.json();

    renderCrypto();
    updateTicker();

    hasLoadedOnce = true;

  } catch {
    if (!hasLoadedOnce) {
      el.innerHTML = "<div style='color:#ff4d4d'>Failed to load</div>";
    }
  }
}

// INIT
loadMarket();
loadFear();
loadCrypto();
renderStocks();

// REFRESH
setInterval(() => {
  loadCrypto();
  loadMarket();
}, 30000);

</script>

</body>
</html>
