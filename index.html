<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}
.ticker {
  width: 100%;
  overflow: hidden;
  background: #0b0f14;
  border-bottom: 1px solid #222;
  padding: 8px 0;
  cursor: default;
}
.ticker-track {
  display: flex;
  will-change: transform;
  font-size: 13px;
  white-space: nowrap;
  width: max-content;
}
.ticker-item {
  margin-right: 50px;
  flex-shrink: 0;
  display: inline-block;
}
.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.header-card { background: #161b22; padding: 12px; border-radius: 10px; }
.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }
.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}
.tab { color: #888; cursor: pointer; font-size: 14px; padding: 4px 8px; }
.tab.active { color: #00ff88; }
.list { padding: 10px; }
.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
}
.row { display: flex; justify-content: space-between; }
.green  { color: #00ff88; }
.red    { color: #ff4d4d; }
.yellow { color: #ffd166; }
.ai { margin-top: 6px; font-size: 12px; color: #aaa; }
.confidence { font-size: 12px; margin-top: 3px; }
.chart-container {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  height: 250px;
}
.news-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}
.news-title { font-size: 14px; margin-bottom: 6px; }
.news-source { font-size: 11px; color: #888; }
.verse-card {
  background: #161b22;
  margin: 10px 15px;
  padding: 14px;
  border-radius: 12px;
  opacity: 1;
  transform: translateY(0);
  transition: all 0.4s ease;
  box-shadow: 0 0 0px rgba(0,255,136,0.0);
}
.verse-card.fade-out { opacity: 0; transform: translateY(10px); }
.verse-card.fade-in  { opacity: 1; transform: translateY(0); }
.verse-card:hover { box-shadow: 0 0 12px rgba(0,255,136,0.15); }
.verse-text { font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
.verse-ref  { font-size: 12px; color: #888; }
.mover-card { background: #161b22; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
.mover-title { font-size: 13px; color: #888; margin-bottom: 6px; }
.mover-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.dash-input {
  width: 100%; background: #0d1117; border: 1px solid #333;
  border-radius: 8px; padding: 10px; color: white; font-size: 14px;
  box-sizing: border-box; margin-bottom: 10px; outline: none;
}
.dash-input:focus { border-color: #00ff88; }
.dash-select {
  width: 100%; background: #0d1117; border: 1px solid #333;
  border-radius: 8px; padding: 10px; color: white; font-size: 14px;
  box-sizing: border-box; margin-bottom: 10px; outline: none;
}
.dash-select:focus { border-color: #00ff88; }
.calc-result {
  background: #0d1117; border-radius: 8px; padding: 12px;
  margin-top: 4px; font-size: 14px; line-height: 1.8;
}
/* ── TOOLS ── */
.tool-input {
  width: 100%; background: #0d1117; border: 1px solid #333;
  border-radius: 8px; padding: 10px; color: white; font-size: 14px;
  box-sizing: border-box; margin-bottom: 8px; outline: none;
}
.tool-input:focus { border-color: #00ff88; }
.tool-btn {
  padding: 11px 16px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.tool-btn:active { opacity: 0.8; }
.tool-btn-green { background: #00ff88; color: #0d1117; }
.tool-btn-red   { background: #ff4d4d; color: white; }
.tool-btn-gray  { background: #21262d; color: #ccc; }
/* ── PAPER TRADING SUB-TABS ── */
.pt-tabs {
  display: flex;
  border-bottom: 1px solid #222;
  margin-bottom: 12px;
}
.pt-tab {
  flex: 1; text-align: center; padding: 10px 4px;
  font-size: 13px; color: #888; cursor: pointer;
}
.pt-tab.active { color: #00ff88; border-bottom: 2px solid #00ff88; }
/* ── MINI CHART ── */
.perf-chart-wrap {
  background: #0d1117; border-radius: 10px; padding: 10px;
  margin-bottom: 12px; position: relative; height: 120px;
}
canvas#perfChart { width: 100% !important; height: 100% !important; }
/* ── STAT CARDS ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card { background: #161b22; border-radius: 10px; padding: 12px; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-val   { font-size: 16px; font-weight: bold; }
/* ── POSITION CARD ── */
.pos-card {
  background: #161b22; border-radius: 10px; padding: 12px;
  margin-bottom: 8px;
}
.pos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.pos-symbol { font-weight: bold; font-size: 15px; }
.pos-pnl    { font-size: 15px; font-weight: bold; }
.pos-detail { font-size: 12px; color: #888; }
/* ── ORDER CARD ── */
.order-card {
  background: #161b22; border-radius: 10px; padding: 12px;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
}
.order-info  { font-size: 13px; }
.order-badge {
  font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold;
}
.badge-pending  { background: #ffd16633; color: #ffd166; }
.badge-filled   { background: #00ff8833; color: #00ff88; }
.badge-canceled { background: #ff4d4d33; color: #ff4d4d; }
/* ── SETUP MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #161b22; border-radius: 16px; padding: 28px 22px;
  width: 88%; max-width: 360px; text-align: center;
}
.modal-title { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
.modal-sub   { font-size: 13px; color: #888; margin-bottom: 20px; }
</style>
</head>
<body>

<!-- ── SETUP MODAL ── -->

<div id="setupModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">💼 Paper Trading Setup</div>
    <div class="modal-sub">Set your starting balance to begin.</div>
    <input id="setupBalance" class="tool-input" type="number" placeholder="e.g. 10000" style="font-size:18px;text-align:center;margin-bottom:16px;" />
    <button class="tool-btn tool-btn-green" style="width:100%;padding:14px;font-size:15px;" onclick="confirmSetup()">Start Trading</button>
  </div>
</div>

<div class="ticker" id="tickerOuter">
  <div id="tickerTrack" class="ticker-track">
    <span class="ticker-item" style="color:#888">Loading market data...</span>
  </div>
</div>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div id="dailyVerse"></div>
<div id="topMovers" style="padding:15px"></div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🧠 AI Market Insight</div>
  <div id="aiInsight" class="news-card" style="cursor:default;">Loading insight...</div>
</div>

<!-- ── MAIN TABS ── -->

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
  <div class="tab" onclick="showTab('tools', event)">Tools</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>
<div id="tools" class="list" style="display:none;padding:10px;"></div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🪙 Crypto News</div>
  <div id="cryptoNews"></div>
</div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">🔍 Search Any Crypto</div>
  <input id="cryptoSearch" class="dash-input" placeholder="e.g. dogecoin, cardano..." />
  <div id="cryptoSearchResult"></div>
</div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">📈 Stock News</div>
  <div id="stockNews"></div>
</div>

<div style="padding:15px">
  <div style="font-weight:bold;margin-bottom:10px;">📊 Search Any Stock</div>
  <input id="stockSearch" class="dash-input" placeholder="e.g. AAPL, TSLA, MSFT..." />
  <div id="stockSearchResult"></div>
</div>

<script>
// ── GLOBALS ────────────────────────────────────────────
let expanded      = null;
let cryptoCache   = null;
let sp500Cache    = null;
let lastTickerKey = "";

// ── TICKER ENGINE ──────────────────────────────────────
let tickerX = 0, tickerHalfW = 0, tickerPaused = false, tickerRAF = null;
const TICKER_SPEED = 0.5;

function tickerStep() {
  if (!tickerPaused) {
    tickerX -= TICKER_SPEED;
    if (tickerHalfW > 0 && tickerX <= -tickerHalfW) tickerX = 0;
    document.getElementById("tickerTrack").style.transform = `translateX(${tickerX}px)`;
  }
  tickerRAF = requestAnimationFrame(tickerStep);
}
document.getElementById("tickerOuter").addEventListener("touchstart", () => { tickerPaused = true; });
document.getElementById("tickerOuter").addEventListener("touchend",   () => { tickerPaused = false; });
document.getElementById("tickerOuter").addEventListener("mouseenter", () => { tickerPaused = true; });
document.getElementById("tickerOuter").addEventListener("mouseleave", () => { tickerPaused = false; });

function startTicker() {
  if (tickerRAF) cancelAnimationFrame(tickerRAF);
  tickerX = 0;
  tickerRAF = requestAnimationFrame(tickerStep);
}

// ── UTILS ──────────────────────────────────────────────
function formatPrice(p) { return p >= 1 ? p.toFixed(2) : p.toFixed(5); }
function fmt$(n) { return "$" + Math.abs(n).toFixed(2); }
function fmtPct(n) { return (n >= 0 ? "+" : "") + n.toFixed(2) + "%"; }

function getInsight(change) {
  if (change > 5)  return "🚀 Strong upward momentum";
  if (change > 2)  return "📈 Uptrend forming";
  if (change < -5) return "🔻 Strong downtrend";
  if (change < -2) return "⚠️ Pullback";
  return "➖ Consolidating";
}
function getConfidence(change) {
  return Math.max(0, Math.min(100, Math.round(50 + change * 4)));
}

// ── S&P 500 ────────────────────────────────────────────
async function loadSP500() {
  try {
    const res  = await fetch("/sp500");
    const data = await res.json();
    if (data && typeof data.price === "number") return data;
    return null;
  } catch { return null; }
}

// ── TICKER BUILD ───────────────────────────────────────
async function updateTicker() {
  if (!cryptoCache) return;
  const freshSP = await loadSP500();
  if (freshSP) sp500Cache = freshSP;

  const cryptoItems = [
    { name: "BTC",  data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP",  data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL",  data: cryptoCache.solana }
  ];

  const newKey = cryptoItems.map(i => i.data ? `${i.name}:${i.data.usd}:${i.data.usd_24h_change}` : "").join("|") +
    (sp500Cache ? `|SP:${sp500Cache.price}:${sp500Cache.change}` : "");
  if (newKey === lastTickerKey) return;
  lastTickerKey = newKey;

  let html = "";
  cryptoItems.forEach(({ name, data: d }) => {
    if (!d) return;
    const change = d.usd_24h_change;
    const arrow  = change >= 0 ? "▲" : "▼";
    const color  = change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `<span class="ticker-item"><span style="color:#ccc">${name}</span> $${formatPrice(d.usd)} <span style="color:${color}">${arrow} ${Math.abs(change).toFixed(2)}%</span></span>`;
  });
  if (sp500Cache) {
    const arrow = sp500Cache.change >= 0 ? "▲" : "▼";
    const color = sp500Cache.change >= 0 ? "#00ff88" : "#ff4d4d";
    html += `<span class="ticker-item"><span style="color:#ccc">S&P 500</span> $${sp500Cache.price.toFixed(2)} <span style="color:${color}">${arrow} ${Math.abs(sp500Cache.change).toFixed(2)}%</span></span>`;
  }

  const track = document.getElementById("tickerTrack");
  track.innerHTML = html + html;
  setTimeout(() => { tickerHalfW = track.scrollWidth / 2; tickerX = 0; }, 100);
}

// ── EXPAND ─────────────────────────────────────────────
function toggleExpand(symbol) {
  expanded = expanded === symbol ? null : symbol;
  document.getElementById("crypto").style.display !== "none" ? renderCrypto() : renderStocks();
}

// ── CRYPTO LIST ────────────────────────────────────────
function renderCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) return;
  const map = {
    BTC:  { data: cryptoCache.bitcoin,            tvSymbol: "BTCUSD"  },
    HBAR: { data: cryptoCache["hedera-hashgraph"], tvSymbol: "HBARUSD" },
    XRP:  { data: cryptoCache.ripple,             tvSymbol: "XRPUSD"  },
    LINK: { data: cryptoCache.chainlink,          tvSymbol: "LINKUSD" },
    SOL:  { data: cryptoCache.solana,             tvSymbol: "SOLUSD"  }
  };
  let html = "";
  Object.entries(map).forEach(([symbol, { data: d, tvSymbol }]) => {
    if (!d) return;
    const insight    = getInsight(d.usd_24h_change);
    const confidence = getConfidence(d.usd_24h_change);
    const confColor  = confidence > 70 ? "green" : confidence > 40 ? "yellow" : "red";
    const chgColor   = d.usd_24h_change >= 0 ? "green" : "red";
    const isExpanded = expanded === symbol;
    const tvParams   = encodeURIComponent(JSON.stringify({ symbol: tvSymbol, dateRange: "1D", colorTheme: "dark", isTransparent: true, autosize: true }));
    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="text-align:right">$${formatPrice(d.usd)}<br><span class="${chgColor}">${d.usd_24h_change.toFixed(2)}%</span></div>
        </div>
        <div class="ai">${insight}</div>
        <div class="confidence ${confColor}">Confidence: ${confidence}%</div>
        ${isExpanded ? `<div class="chart-container"><iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}" style="width:100%;height:100%;border:none;"></iframe></div>` : ""}
      </div>`;
  });
  el.innerHTML = html;
}

// ── TOP MOVERS ─────────────────────────────────────────
function renderTopMovers() {
  if (!cryptoCache) return;
  const coins = [
    { name: "BTC",  data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP",  data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL",  data: cryptoCache.solana }
  ].filter(c => c.data);
  const sorted  = coins.sort((a, b) => b.data.usd_24h_change - a.data.usd_24h_change);
  const gainers = sorted.slice(0, 2);
  const losers  = sorted.slice(-2).reverse();
  document.getElementById("topMovers").innerHTML = `
    <div style="font-weight:bold;margin-bottom:10px;">📊 Top Movers</div>
    <div class="mover-card">
      <div class="mover-title">🚀 Top Gainers</div>
      ${gainers.map(c => `<div class="mover-row"><span>${c.name}</span><span class="green">+${c.data.usd_24h_change.toFixed(2)}%</span></div>`).join("")}
    </div>
    <div class="mover-card">
      <div class="mover-title">🔻 Top Losers</div>
      ${losers.map(c => `<div class="mover-row"><span>${c.name}</span><span class="red">${c.data.usd_24h_change.toFixed(2)}%</span></div>`).join("")}
    </div>`;
}

// ── STOCKS LIST ────────────────────────────────────────
function renderStocks() {
  const el = document.getElementById("stocks");
  const stocks = [
    { symbol: "AMD",  tvSymbol: "NASDAQ:AMD"  },
    { symbol: "NVDA", tvSymbol: "NASDAQ:NVDA" },
    { symbol: "SOFI", tvSymbol: "NASDAQ:SOFI" },
    { symbol: "SCHD", tvSymbol: "AMEX:SCHD"   },
    { symbol: "HOOD", tvSymbol: "NASDAQ:HOOD" }
  ];
  let html = "";
  stocks.forEach(({ symbol, tvSymbol }) => {
    const isExpanded = expanded === symbol;
    const tvParams   = encodeURIComponent(JSON.stringify({ symbol: tvSymbol, dateRange: "1D", colorTheme: "dark", isTransparent: true, autosize: true }));
    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row"><div>${symbol}</div><div style="color:#888;font-size:12px;">Tap to expand</div></div>
        ${isExpanded ? `<div class="chart-container"><iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}" style="width:100%;height:100%;border:none;"></iframe></div>` : ""}
      </div>`;
  });
  el.innerHTML = html;
}

// ── MARKET HEADER ──────────────────────────────────────
async function loadMarket() {
  try {
    const res = await fetch("/market");
    const d   = await res.json();
    document.getElementById("marketCap").textContent = "$" + (d.data.total_market_cap.usd / 1e12).toFixed(2) + "T";
    const change   = d.data.market_cap_change_percentage_24h_usd;
    const changeEl = document.getElementById("marketChange");
    changeEl.textContent = change.toFixed(2) + "%";
    changeEl.className   = "value " + (change >= 0 ? "green" : "red");
    document.getElementById("btcDom").textContent = d.data.market_cap_percentage.btc.toFixed(1) + "%";
  } catch { document.getElementById("marketCap").textContent = "Unavailable"; }
}

async function loadFear() {
  try {
    const r = await fetch("https://api.alternative.me/fng/");
    const d = await r.json();
    document.getElementById("fearValue").textContent = d.data[0].value + " – " + d.data[0].value_classification;
  } catch { document.getElementById("fearValue").textContent = "--"; }
}

async function loadCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) el.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";
  try {
    const res = await fetch("/crypto");
    cryptoCache = await res.json();
    renderCrypto();
    renderTopMovers();
    await updateTicker();
  } catch {
    if (!cryptoCache) el.innerHTML = "<div style='padding:10px;color:#ff4d4d'>Failed to load prices</div>";
  }
}

async function loadAiInsight() {
  const el = document.getElementById("aiInsight");
  try {
    const r = await fetch("/ai-insight");
    const d = await r.json();
    el.textContent = d.text || "No insight available.";
  } catch { el.textContent = "Failed to load insight."; }
}

// ── CRYPTO SEARCH ──────────────────────────────────────
let cryptoSearchTimer = null;
async function searchCrypto() {
  const query = document.getElementById("cryptoSearch").value.trim().toLowerCase();
  const el    = document.getElementById("cryptoSearchResult");
  if (!query) { el.innerHTML = ""; return; }
  el.innerHTML = "<div style='color:#888;font-size:13px;padding:8px 0'>Searching...</div>";
  try {
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${query}&vs_currencies=usd&include_24hr_change=true`);
    const d = await r.json();
    const coin = d[query];
    if (coin?.usd) {
      const change = coin.usd_24h_change || 0;
      const arrow  = change >= 0 ? "▲" : "▼";
      const chgColor = change >= 0 ? "#00ff88" : "#ff4d4d";
      el.innerHTML = `<div class="mover-card" style="cursor:default;"><div class="mover-row"><span style="font-weight:bold;text-transform:uppercase;">${query}</span><span style="font-weight:bold;">$${formatPrice(coin.usd)}</span></div><div class="mover-row"><span style="color:#888;font-size:12px;">24h Change</span><span style="color:${chgColor};font-size:12px;">${arrow} ${Math.abs(change).toFixed(2)}%</span></div></div>`;
    } else {
      el.innerHTML = "<div style='color:#888;font-size:13px;padding:8px 0'>Not found — try the full CoinGecko ID (e.g. \"dogecoin\", \"cardano\")</div>";
    }
  } catch { el.innerHTML = "<div style='color:#ff4d4d;font-size:13px;padding:8px 0'>Error fetching data</div>"; }
}
document.getElementById("cryptoSearch").addEventListener("input", () => { clearTimeout(cryptoSearchTimer); cryptoSearchTimer = setTimeout(searchCrypto, 600); });

// ── STOCK SEARCH ───────────────────────────────────────
let stockSearchTimer = null;
function searchStock() {
  const query = document.getElementById("stockSearch").value.trim().toUpperCase();
  const el    = document.getElementById("stockSearchResult");
  if (!query) { el.innerHTML = ""; return; }
  const tvSymbol = `NASDAQ:${query}`;
  const tvParams = encodeURIComponent(JSON.stringify({ symbol: tvSymbol, dateRange: "1D", colorTheme: "dark", isTransparent: true, autosize: true }));
  el.innerHTML = `<div class="mover-card" style="cursor:default;"><div style="font-size:13px;color:#888;margin-bottom:8px;">${query} — tap chart to interact</div><div class="chart-container"><iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}" style="width:100%;height:100%;border:none;"></iframe></div></div>`;
}
document.getElementById("stockSearch").addEventListener("input", () => { clearTimeout(stockSearchTimer); stockSearchTimer = setTimeout(searchStock, 600); });

// ── NEWS ───────────────────────────────────────────────
async function loadCryptoNews() {
  const el = document.getElementById("cryptoNews");
  try {
    const r = await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");
    const d = await r.json();
    el.innerHTML = d.Data.slice(0, 5).map(a => `<div class="news-card" onclick="window.open('${a.url}','_blank')"><div class="news-title">${a.title}</div><div class="news-source">${a.source}</div></div>`).join("");
  } catch { el.innerHTML = "<div style='color:#888'>Failed to load news</div>"; }
}
async function loadStockNews() {
  const el = document.getElementById("stockNews");
  try {

function drawPerfChart() {
  const canvas = document.getElementById("perfChart");
  if (!canvas || perfHistory.length < 2) return;
  const ctx  = canvas.getContext("2d");
  const W    = canvas.parentElement.clientWidth - 20;
  const H    = 100;
  canvas.width  = W;
  canvas.height = H;

  const vals = perfHistory.map(p => p.value);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const toX = i => (i / (vals.length - 1)) * W;
  const toY = v => H - ((v - minV) / range) * (H - 10) - 5;

  const isUp    = vals[vals.length - 1] >= vals[0];
  const lineClr = isUp ? "#00ff88" : "#ff4d4d";

  ctx.clearRect(0, 0, W, H);

  // fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, isUp ? "rgba(0,255,136,0.25)" : "rgba(255,77,77,0.25)");
  grad.addColorStop(1, "rgba(0,0,0,0)");
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => { if (i > 0) ctx.lineTo(toX(i), toY(v)); });
  ctx.lineTo(toX(vals.length - 1), H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(vals[0]));
  vals.forEach((v, i) => { if (i > 0) ctx.lineTo(toX(i), toY(v)); });
  ctx.strokeStyle = lineClr;
  ctx.lineWidth   = 2;
  ctx.stroke();
}

  return `

let paperBalance      = parseFloat(localStorage.getItem("ptBalance") || "0");
let paperStartBalance = parseFloat(localStorage.getItem("ptStartBalance") || "0");
let paperPositions    = JSON.parse(localStorage.getItem("ptPositions") || "[]");
let paperOrders       = JSON.parse(localStorage.getItem("ptOrders")    || "[]");
let perfHistory       = JSON.parse(localStorage.getItem("ptHistory")   || "[]");
let dayStartValue     = parseFloat(localStorage.getItem("ptDayStart")  || "0");
const liveprices      = {};

function savePT() {
  localStorage.setItem("ptBalance",      paperBalance.toString());
  localStorage.setItem("ptStartBalance", paperStartBalance.toString());
  localStorage.setItem("ptPositions",    JSON.stringify(paperPositions));
  localStorage.setItem("ptOrders",       JSON.stringify(paperOrders));
  localStorage.setItem("ptHistory",      JSON.stringify(perfHistory));
  localStorage.setItem("ptDayStart",     dayStartValue.toString());
}

function confirmSetup() {
  const val = parseFloat(document.getElementById("setupBalance").value);
  if (!val || val <= 0) return;
  paperBalance      = val;
  paperStartBalance = val;
  dayStartValue     = val;
  perfHistory       = [{ value: val, ts: Date.now() }];
  savePT();
  document.getElementById("setupModal").style.display = "none";
}

function resetPaperTrading() {
  if (!confirm("Reset all paper trading data?")) return;
  localStorage.removeItem("ptBalance");
  localStorage.removeItem("ptStartBalance");
  localStorage.removeItem("ptPositions");
  localStorage.removeItem("ptOrders");
  localStorage.removeItem("ptHistory");
  localStorage.removeItem("ptDayStart");
  paperBalance      = 0;
  paperStartBalance = 0;
  paperPositions    = [];
  paperOrders       = [];
  perfHistory       = [];
  dayStartValue     = 0;
  document.getElementById("setupModal").style.display = "flex";
}

function calcPortfolioValue() {
  return paperPositions.reduce((sum, p) => {
    const price = liveprices[p.symbol] || p.avgPrice;
    return sum + price * p.qty;
  }, 0);
}

function calcDayPnl() {
  const current = paperBalance + calcPortfolioValue();
  return current - dayStartValue;
}

// ── ORDER PLACEMENT ────────────────────────────────────
async function placeOrder(side) {
  const symRaw  = document.getElementById("ptSymbol")?.value.trim().toUpperCase();
  const qty     = parseFloat(document.getElementById("ptQty")?.value);
  const type    = document.getElementById("ptOrderType")?.value || "market";

  if (!symRaw || !qty || qty <= 0) {
    alert("Enter a symbol and quantity.");
    return;
  }

  const limitPrice = parseFloat(document.getElementById("ptLimitPrice")?.value) || 0;
  const stopPrice  = parseFloat(document.getElementById("ptStopPrice")?.value)  || 0;

  // fetch current price
  let price = liveprices[symRaw];
  if (!price) {
    try {
      const r = await fetch(`/price/${symRaw.toLowerCase()}`);
      const d = await r.json();
      if (!d.price) { alert("Could not fetch price for " + symRaw); return; }
      price = d.price;
      liveprices[symRaw] = price;
    } catch { alert("Price lookup failed."); return; }
  }

  const order = {
    id: Date.now().toString(),
    symbol: symRaw, side, qty, type,
    price: type === "market" ? price : (type === "limit" ? limitPrice : stopPrice),
    marketPrice: price,
    status: type === "market" ? "filled" : "pending",
    ts: Date.now()
  };

  paperOrders.push(order);

  if (type === "market") {
    executeOrder(order, price);
  } else {
    // pending orders will be checked in the live P&L loop
  }

  savePT();
  renderTools();
}

function executeOrder(order, execPrice) {
  const cost = execPrice * order.qty;

  if (order.side === "buy") {
    if (cost > paperBalance) { alert("Insufficient buying power!"); order.status = "canceled"; return; }
    paperBalance -= cost;

    const existing = paperPositions.find(p => p.symbol === order.symbol && p.side === "buy");
    if (existing) {
      const totalQty    = existing.qty + order.qty;
      existing.avgPrice = ((existing.avgPrice * existing.qty) + (execPrice * order.qty)) / totalQty;
      existing.qty      = totalQty;
    } else {
      paperPositions.push({ id: Date.now().toString(), symbol: order.symbol, side: "buy", qty: order.qty, avgPrice: execPrice });
    }
  } else {
    const pos = paperPositions.find(p => p.symbol === order.symbol && p.side === "buy");
    if (!pos || pos.qty < order.qty) { alert("Not enough shares to sell!"); order.status = "canceled"; return; }
    paperBalance += execPrice * order.qty;
    pos.qty -= order.qty;
    if (pos.qty <= 0) paperPositions = paperPositions.filter(p => p.id !== pos.id);
  }

  order.status     = "filled";
  order.execPrice  = execPrice;
  recordPerfSnapshot();
}

function closePosition(posId) {
  const pos = paperPositions.find(p => p.id === posId);
  if (!pos) return;
  const price = liveprices[pos.symbol] || pos.avgPrice;
  paperBalance += price * pos.qty;
  paperPositions = paperPositions.filter(p => p.id !== posId);
  paperOrders.push({ id: Date.now().toString(), symbol: pos.symbol, side: "sell", qty: pos.qty, type: "market", price, status: "filled", ts: Date.now() });
  recordPerfSnapshot();
  savePT();
  renderTools();
}

function cancelOrder(orderId) {
  const o = paperOrders.find(o => o.id === orderId);
  if (o) o.status = "canceled";
  savePT();
  renderPTOrders(document.getElementById("ptContent"));
}

function recordPerfSnapshot() {
  const netVal = paperBalance + calcPortfolioValue();
  perfHistory.push({ value: netVal, ts: Date.now() });
  if (perfHistory.length > 200) perfHistory.shift();
}

// ── CHECK PENDING ORDERS ───────────────────────────────
function checkPendingOrders() {
  let changed = false;
  paperOrders.filter(o => o.status === "pending").forEach(o => {
    const current = liveprices[o.symbol];
    if (!current) return;
    let shouldFill = false;
    if (o.type === "limit" && o.side === "buy"  && current <= o.price) shouldFill = true;
    if (o.type === "limit" && o.side === "sell" && current >= o.price) shouldFill = true;
    if (o.type === "stop"  && current <= o.price) shouldFill = true;
    if (shouldFill) { executeOrder(o, current); changed = true; }
  });
  if (changed) { savePT(); if (document.getElementById("tools").style.display !== "none") renderTools(); }
}

// ── LIVE P&L LOOP (every second) ──────────────────────
async function livePnlLoop() {
  if (paperPositions.length === 0) return;
  const symbols = [...new Set(paperPositions.map(p => p.symbol))];
  for (const sym of symbols) {
    try {
      const r = await fetch(`/price/${sym.toLowerCase()}`);
      const d = await r.json();
      if (d.price) liveprices[sym] = d.price;
    } catch {}
  }
  checkPendingOrders();

  // Update P&L in DOM without full re-render
  if (document.getElementById("tools").style.display !== "none") {
    paperPositions.forEach(p => {
      const pnlEl = document.getElementById(`pnl_${p.id}`);
      if (!pnlEl) return;
      const currentPrice = liveprices[p.symbol] || p.avgPrice;
      const pnl    = (currentPrice - p.avgPrice) * p.qty * (p.side === "buy" ? 1 : -1);
      const pnlPct = p.avgPrice > 0 ? (pnl / (p.avgPrice * p.qty)) * 100 : 0;
      pnlEl.style.color   = pnl >= 0 ? "#00ff88" : "#ff4d4d";
      pnlEl.textContent   = `${pnl>=0?"+":""}$${Math.abs(pnl).toFixed(2)} (${fmtPct(pnlPct)})`;
    });

    // update balance display
    const balEl = document.getElementById("ptBalanceDisplay");
    if (balEl) balEl.textContent = "$" + paperBalance.toFixed(2);
  }
}
