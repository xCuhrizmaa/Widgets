<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0d1117;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

.ticker {
  width: 100%;
  overflow: hidden;
  background: #0b0f14;
  border-bottom: 1px solid #222;
  padding: 8px 0;
}

.ticker-track {
  display: flex;
  width: max-content;
  animation: scrollTicker 20s linear infinite;
  font-size: 13px;
  white-space: nowrap;
}

.ticker-track:hover {
  animation-play-state: paused;
}

@keyframes scrollTicker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  margin-right: 40px;
  flex-shrink: 0;
}

.header { padding: 15px; border-bottom: 1px solid #222; }
.header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.header-card {
  background: #161b22;
  padding: 12px;
  border-radius: 10px;
}

.label { font-size: 12px; color: #888; }
.value { font-weight: bold; margin-top: 5px; }

.tabs {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  border-bottom: 1px solid #222;
}

.tab { color: #888; cursor: pointer; }
.tab.active { color: #00ff88; }

.list { padding: 10px; }

.card {
  background: #161b22;
  margin: 8px 0;
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
}

.row {
  display: flex;
  justify-content: space-between;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }
.yellow { color: #ffd166; }

.ai {
  margin-top: 6px;
  font-size: 12px;
  color: #aaa;
}

.confidence {
  font-size: 12px;
  margin-top: 3px;
}

.chart-container {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  height: 250px;
}
</style>
</head>

<body>

<div class="ticker">
  <div id="tickerTrack" class="ticker-track">
    <span class="ticker-item">Loading market data...</span>
  </div>
</div>

<div class="header">
  <div class="header-grid">
    <div class="header-card"><div class="label">Market Cap</div><div id="marketCap" class="value">...</div></div>
    <div class="header-card"><div class="label">24h Change</div><div id="marketChange" class="value">...</div></div>
    <div class="header-card"><div class="label">BTC Dominance</div><div id="btcDom" class="value">...</div></div>
    <div class="header-card"><div class="label">Fear & Greed</div><div id="fearValue" class="value">...</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('crypto', event)">Crypto</div>
  <div class="tab" onclick="showTab('stocks', event)">Stocks</div>
</div>

<div id="crypto" class="list"></div>
<div id="stocks" class="list" style="display:none;"></div>

<script>

let expanded = null;
let cryptoCache = null;
let lastTickerKey = "";
let sp500Cache = null;

// 🔥 NEW (S&P fetch via backend)
async function loadSP500() {
  try {
    const res = await fetch("/sp500");
    return await res.json();
  } catch {
    return null;
  }
}

function formatPrice(p) {
  if (p >= 1) return p.toFixed(2);
  return p.toFixed(5);
}

function getInsight(change) {
  if (change > 5) return "🚀 Strong upward momentum";
  if (change > 2) return "📈 Uptrend forming";
  if (change < -5) return "🔻 Strong downtrend";
  if (change < -2) return "⚠️ Pullback";
  return "➖ Consolidating";
}

function getConfidence(change) {
  let score = 50 + (change * 4);
  return Math.max(0, Math.min(100, Math.round(score)));
}

// 🔥 UPDATED TICKER
async function updateTicker() {
  if (!cryptoCache) return;

  if (!sp500Cache) {
    sp500Cache = await loadSP500();
  }

  const items = [
    { name: "BTC", data: cryptoCache.bitcoin },
    { name: "HBAR", data: cryptoCache["hedera-hashgraph"] },
    { name: "XRP", data: cryptoCache.ripple },
    { name: "LINK", data: cryptoCache.chainlink },
    { name: "SOL", data: cryptoCache.solana },
    { name: "S&P", data: sp500Cache, isIndex: true }
  ];

  const key = items.map(i => {
    if (!i.data) return "";
    return i.isIndex
      ? `${i.name}:${i.data.price}:${i.data.change}`
      : `${i.name}:${i.data.usd}:${i.data.usd_24h_change}`;
  }).join("|");

  if (key === lastTickerKey) return;
  lastTickerKey = key;

  let html = "";

  items.forEach(({ name, data: d, isIndex }) => {
    if (!d) return;

    const price = isIndex ? d.price : d.usd;
    const change = isIndex ? d.change : d.usd_24h_change;

    const arrow = change >= 0 ? "▲" : "▼";
    const color = change >= 0 ? "#00ff88" : "#ff4d4d";

    html += `
      <span class="ticker-item">
        ${name} $${price.toFixed(2)}
        <span style="color:${color}">
          ${arrow} ${Math.abs(change).toFixed(2)}%
        </span>
      </span>
    `;
  });

  document.getElementById("tickerTrack").innerHTML = html + html;
}

function toggleExpand(symbol) {
  expanded = expanded === symbol ? null : symbol;

  if (document.getElementById("crypto").style.display !== "none") {
    renderCrypto();
  } else {
    renderStocks();
  }
}

// KEEP EVERYTHING ELSE EXACTLY SAME ↓↓↓

function renderCrypto() {
  const el = document.getElementById("crypto");
  if (!cryptoCache) return;

  const map = {
    BTC:  { data: cryptoCache.bitcoin, tvSymbol: "BTCUSD" },
    HBAR: { data: cryptoCache["hedera-hashgraph"], tvSymbol: "HBARUSD" },
    XRP:  { data: cryptoCache.ripple, tvSymbol: "XRPUSD" },
    LINK: { data: cryptoCache.chainlink, tvSymbol: "LINKUSD" },
    SOL:  { data: cryptoCache.solana, tvSymbol: "SOLUSD" }
  };

  let html = "";

  Object.entries(map).forEach(([symbol, { data: d, tvSymbol }]) => {
    if (!d) return;

    const insight = getInsight(d.usd_24h_change);
    const confidence = getConfidence(d.usd_24h_change);
    const color = confidence > 70 ? "green" : confidence > 40 ? "yellow" : "red";
    const changeColor = d.usd_24h_change >= 0 ? "green" : "red";
    const isExpanded = expanded === symbol;

    const tvParams = encodeURIComponent(JSON.stringify({
      symbol: tvSymbol,
      dateRange: "1D",
      colorTheme: "dark",
      isTransparent: true,
      autosize: true
    }));

    html += `
      <div class="card" onclick="toggleExpand('${symbol}')">
        <div class="row">
          <div>${symbol}</div>
          <div style="text-align:right">
            $${formatPrice(d.usd)}<br>
            <span class="${changeColor}">${d.usd_24h_change.toFixed(2)}%</span>
          </div>
        </div>
        <div class="ai">${insight}</div>
        <div class="confidence ${color}">Confidence: ${confidence}%</div>
        ${isExpanded ? `
          <div class="chart-container">
            <iframe src="https://www.tradingview.com/embed-widget/mini-symbol-overview/?locale=en#${tvParams}"></iframe>
          </div>
        ` : ""}
      </div>
    `;
  });

  el.innerHTML = html;
}

// (stocks + market + fear unchanged)

async function loadCrypto() {
  const el = document.getElementById("crypto");

  if (!cryptoCache) {
    el.innerHTML = "<div style='padding:10px;color:#888'>Loading...</div>";
  }

  try {
    const res = await fetch("/crypto");
    cryptoCache = await res.json();

    renderCrypto();
    await updateTicker();

  } catch {}
}

// INIT
loadMarket();
loadFear();
loadCrypto();
renderStocks();

setInterval(() => {
  loadCrypto();
  loadMarket();
}, 60000);

</script>

</body>
</html>
